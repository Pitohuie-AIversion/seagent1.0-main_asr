<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>水下多智能体任务决策系统 - ROV HUD</title>
  <!-- 引入高科技感的 Google 字体 -->
  <link
    href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Share+Tech+Mono&family=Inter:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">
  <style>
    /* ==================== 科技感全局设计系统 ==================== */
    :root {
      --bg-deep: #02050f;
      --bg-dark: #050b18;
      --bg-card: rgba(6, 12, 30, 0.75);
      --accent-cyan: #00f0ff;
      --accent-cyan-glow: rgba(0, 240, 255, 0.4);
      --accent-green: #00ffc4;
      --accent-green-glow: rgba(0, 255, 196, 0.3);
      --accent-amber: #ff9d00;
      --accent-amber-glow: rgba(255, 157, 0, 0.3);
      --accent-red: #ff003c;
      --accent-red-glow: rgba(255, 0, 60, 0.4);
      --text-primary: #eef2ff;
      --text-secondary: #7b89b6;
      --border-cyan: rgba(0, 240, 255, 0.22);
      --font-tech: 'Orbitron', 'Inter', sans-serif;
      --font-mono: 'Share Tech Mono', 'Courier New', monospace;
      --font-sans: 'Inter', -apple-system, sans-serif;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: var(--bg-deep);
      background-image:
        radial-gradient(circle at 50% 30%, rgba(9, 28, 66, 0.45) 0%, rgba(2, 5, 15, 1) 85%),
        linear-gradient(rgba(0, 240, 255, 0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 240, 255, 0.02) 1px, transparent 1px);
      background-size: 100% 100%, 40px 40px, 40px 40px;
      font-family: var(--font-sans);
      color: var(--text-primary);
      height: 100vh;
      overflow: hidden;
    }

    /* scanline 扫描线效果 */
    body::before {
      content: " ";
      display: block;
      position: fixed;
      top: 0;
      left: 0;
      bottom: 0;
      right: 0;
      background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.3) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.04), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.04));
      z-index: 9999;
      background-size: 100% 4px, 6px 100%;
      pointer-events: none;
      opacity: 0.35;
    }

    .app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-width: 1700px;
      margin: 0 auto;
      padding: 0 1rem;
    }

    /* ==================== 顶部状态条 Header ==================== */
    .header {
      padding: 1rem 1.5rem;
      border-bottom: 1px solid var(--border-cyan);
      background: rgba(4, 9, 22, 0.9);
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 0.5rem;
      border-radius: 0.5rem 0.5rem 0 0;
      box-shadow: 0 0 25px rgba(0, 240, 255, 0.12);
      backdrop-filter: blur(10px);
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .status-indicator-light {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--accent-green);
      box-shadow: 0 0 10px var(--accent-green);
      animation: pulse-glow-green 2s infinite;
    }

    .header h1 {
      font-family: var(--font-tech);
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: 1px;
      color: var(--accent-cyan);
      text-shadow: 0 0 10px var(--accent-cyan-glow);
    }

    .header p {
      font-size: 0.8rem;
      color: var(--text-secondary);
      margin-top: 2px;
      letter-spacing: 2px;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .nav-telemetry-item {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
    }

    .nav-label {
      font-family: var(--font-tech);
      font-size: 0.65rem;
      color: var(--text-secondary);
      letter-spacing: 1px;
    }

    .nav-value {
      font-family: var(--font-mono);
      font-size: 0.95rem;
      color: var(--accent-cyan);
      text-shadow: 0 0 5px var(--accent-cyan-glow);
    }

    .lang-selector select {
      background: var(--bg-deep);
      color: var(--text-primary);
      border: 1px solid var(--accent-cyan);
      padding: 6px 12px;
      border-radius: 4px;
      font-family: var(--font-tech);
      font-size: 0.75rem;
      cursor: pointer;
      outline: none;
      transition: all 0.3s;
    }

    .lang-selector select:hover {
      background: rgba(0, 240, 255, 0.1);
      box-shadow: 0 0 10px var(--accent-cyan-glow);
    }

    /* ==================== 两栏 主区域 ==================== */
    .main-panel {
      display: grid;
      grid-template-columns: 1fr 320px;
      gap: 1rem;
      flex: 1;
      overflow: hidden;
      margin-top: 0.5rem;
      margin-bottom: 0.5rem;
    }

    /* ==================== 统一的玻璃材质面板 Card ==================== */
    .hud-panel {
      background: var(--bg-card);
      border: 1px solid var(--border-cyan);
      border-radius: 0.5rem;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(12px);
    }

    /* ==================== 科技感 SVG 图标样式 ==================== */
    .tech-icon {
      width: 16px;
      height: 16px;
      stroke: var(--accent-cyan);
      fill: none;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
      display: inline-block;
      vertical-align: middle;
      filter: drop-shadow(0 0 3px var(--accent-cyan-glow));
      transition: all 0.3s;
    }

    .tech-icon.success {
      stroke: var(--accent-green);
      filter: drop-shadow(0 0 3px var(--accent-green-glow));
    }

    .tech-icon.warning {
      stroke: var(--accent-amber);
      filter: drop-shadow(0 0 3px var(--accent-amber-glow));
    }

    .tech-icon.danger {
      stroke: var(--accent-red);
      filter: drop-shadow(0 0 3px var(--accent-red-glow));
    }

    .card-title .tech-icon,
    .info-title .tech-icon {
      margin-right: 8px;
    }

    /* 科技感头像 SVG */
    .bot-avatar-svg,
    .user-avatar-svg {
      width: 22px;
      height: 22px;
      stroke: var(--accent-cyan);
      fill: none;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
      filter: drop-shadow(0 0 4px var(--accent-cyan-glow));
    }

    .user-avatar-svg {
      stroke: #3b82f6;
      filter: drop-shadow(0 0 4px rgba(59, 130, 246, 0.4));
    }

    .visor-glow {
      fill: var(--accent-cyan);
      filter: drop-shadow(0 0 5px var(--accent-cyan));
      animation: visor-pulse 2s infinite alternate;
    }

    @keyframes visor-pulse {
      0% {
        opacity: 0.5;
      }

      100% {
        opacity: 1;
      }
    }

    /* ==================== 左侧遥测栏 Telemetry Panel ==================== */
    .telemetry-panel {
      gap: 1rem;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }

    .telemetry-card {
      background: rgba(5, 12, 28, 0.6);
      border: 1px solid rgba(0, 240, 255, 0.15);
      border-radius: 0.5rem;
      padding: 0.9rem;
      display: flex;
      flex-direction: column;
      gap: 8px;
      transition: border-color 0.3s;
    }

    .telemetry-card:hover {
      border-color: rgba(0, 240, 255, 0.35);
    }

    .card-title {
      font-family: var(--font-tech);
      font-size: 0.75rem;
      color: var(--accent-cyan);
      letter-spacing: 1px;
      border-left: 2px solid var(--accent-cyan);
      padding-left: 6px;
      margin-bottom: 4px;
      display: flex;
      align-items: center;
    }

    /* 2D 雷达扫描效果 */
    .sonar-container {
      position: relative;
      width: 100%;
      height: 180px;
      background: radial-gradient(circle, rgba(0, 32, 64, 0.5) 0%, rgba(3, 7, 18, 0.9) 100%);
      border: 1px solid rgba(0, 240, 255, 0.2);
      border-radius: 6px;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .sonar-grid {
      position: absolute;
      width: 160px;
      height: 160px;
      border-radius: 50%;
      border: 1px dashed rgba(0, 240, 255, 0.15);
    }

    .sonar-grid::before {
      content: "";
      position: absolute;
      top: 20px;
      left: 20px;
      right: 20px;
      bottom: 20px;
      border-radius: 50%;
      border: 1px dashed rgba(0, 240, 255, 0.2);
    }

    .sonar-grid::after {
      content: "";
      position: absolute;
      top: 50px;
      left: 50px;
      right: 50px;
      bottom: 50px;
      border-radius: 50%;
      border: 1px solid rgba(0, 240, 255, 0.25);
    }

    .sonar-axis-x {
      position: absolute;
      width: 100%;
      height: 1px;
      background: rgba(0, 240, 255, 0.1);
    }

    .sonar-axis-y {
      position: absolute;
      width: 1px;
      height: 100%;
      background: rgba(0, 240, 255, 0.1);
    }

    .sonar-sweep {
      position: absolute;
      width: 180px;
      height: 180px;
      background: conic-gradient(from 0deg at 50% 50%, rgba(0, 240, 255, 0.2) 0deg, rgba(0, 240, 255, 0) 90deg);
      border-radius: 50%;
      animation: sweep 4s linear infinite;
      pointer-events: none;
    }

    .sonar-center {
      position: absolute;
      width: 6px;
      height: 6px;
      background: var(--accent-cyan);
      border-radius: 50%;
      box-shadow: 0 0 8px var(--accent-cyan);
    }

    /* 动态声呐目标 */
    .sonar-target {
      position: absolute;
      width: 6px;
      height: 6px;
      background: var(--accent-green);
      border-radius: 50%;
      box-shadow: 0 0 10px var(--accent-green);
      animation: target-pulse 2s infinite ease-in-out;
      opacity: 0;
    }

    .target-1 {
      top: 35%;
      left: 30%;
      animation-delay: 0.5s;
    }

    .target-2 {
      top: 65%;
      left: 70%;
      animation-delay: 2s;
    }

    .target-valve {
      top: 48%;
      left: 60%;
      background: var(--accent-amber);
      box-shadow: 0 0 10px var(--accent-amber);
      display: none;
    }

    .sonar-details {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 4px;
    }

    .sonar-detail-row {
      display: flex;
      flex-direction: column;
    }

    .sonar-detail-row span:first-child {
      font-size: 0.65rem;
      color: var(--text-secondary);
    }

    .sonar-detail-row .mono-value {
      font-family: var(--font-mono);
      font-size: 0.85rem;
      color: var(--accent-cyan);
    }

    /* 环境深度指示器 */
    .environment-container {
      display: flex;
      gap: 15px;
      align-items: stretch;
    }

    .gauge-column {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .gauge-column.flex-col {
      gap: 12px;
    }

    .gauge-label {
      font-size: 0.65rem;
      color: var(--text-secondary);
      margin-bottom: 4px;
      display: block;
    }

    .depth-bar-container {
      position: relative;
      height: 100px;
      background: rgba(0, 32, 64, 0.4);
      border: 1px solid rgba(0, 240, 255, 0.2);
      border-radius: 4px;
      margin: 4px 0;
      overflow: hidden;
    }

    .depth-bar-fill {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      background: linear-gradient(to top, rgba(0, 240, 255, 0.8), rgba(0, 80, 255, 0.4));
      box-shadow: 0 0 10px var(--accent-cyan);
      transition: height 1s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .depth-marker {
      position: absolute;
      right: 4px;
      font-family: var(--font-mono);
      font-size: 0.6rem;
      color: rgba(0, 240, 255, 0.5);
      pointer-events: none;
    }

    .marker-0 {
      top: 2px;
    }

    .marker-500 {
      top: calc(50% - 5px);
    }

    .marker-1000 {
      bottom: 2px;
    }

    .mono-value.big-val {
      font-family: var(--font-mono);
      font-size: 1.1rem;
      font-weight: bold;
      color: var(--text-primary);
      text-shadow: 0 0 5px rgba(255, 255, 255, 0.2);
    }

    .small-gauge-item {
      background: rgba(0, 32, 64, 0.2);
      padding: 6px 10px;
      border-radius: 4px;
      border: 1px solid rgba(0, 240, 255, 0.08);
    }

    /* 动力诊断网格 */
    .thrusters-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
      margin-top: 4px;
    }

    .thruster-item {
      background: rgba(255, 0, 60, 0.1);
      border: 1px solid rgba(255, 0, 60, 0.2);
      border-radius: 4px;
      padding: 6px 2px;
      display: flex;
      flex-direction: column;
      align-items: center;
      transition: all 0.3s;
    }

    .thruster-item.active {
      background: rgba(0, 255, 196, 0.1);
      border: 1px solid rgba(0, 255, 196, 0.3);
    }

    .thruster-name {
      font-family: var(--font-tech);
      font-size: 0.65rem;
      font-weight: bold;
      color: var(--text-secondary);
    }

    .thruster-item.active .thruster-name {
      color: var(--accent-green);
    }

    .thruster-status {
      font-family: var(--font-mono);
      font-size: 0.55rem;
      color: var(--accent-red);
    }

    .thruster-item.active .thruster-status {
      color: var(--accent-green);
    }

    /* 遥测流 */
    .diagnostics-logs {
      display: flex;
      flex-direction: column;
      gap: 4px;
      margin-top: 6px;
    }

    .diag-header {
      font-size: 0.65rem;
      color: var(--text-secondary);
    }

    .diag-log-container {
      background: rgba(0, 5, 15, 0.8);
      border: 1px solid rgba(0, 240, 255, 0.15);
      border-radius: 4px;
      height: 85px;
      padding: 6px;
      font-family: var(--font-mono);
      font-size: 0.65rem;
      color: var(--accent-cyan);
      overflow-y: auto;
      line-height: 1.4;
      white-space: pre-wrap;
    }

    /* ==================== 中间对话栏 Dialogue Panel ==================== */
    .chat-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      border: 1px solid var(--border-cyan);
      background: rgba(5, 11, 26, 0.75);
      border-radius: 0.5rem;
      position: relative;
      min-height: 0;
      overflow: hidden;
    }

    /* 语音输入时的科技感波动效果 */
    .audio-waveform-wrapper {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 73px;
      background: rgba(3, 7, 18, 0.9);
      z-index: 10;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
      border-radius: 0.5rem 0.5rem 0 0;
    }

    .waveform-bar {
      width: 5px;
      height: 20px;
      background: var(--accent-cyan);
      border-radius: 3px;
      box-shadow: 0 0 10px var(--accent-cyan);
      animation: pulse-wave 1.2s infinite ease-in-out;
    }

    .waveform-bar:nth-child(1) {
      animation-delay: 0.1s;
    }

    .waveform-bar:nth-child(2) {
      animation-delay: 0.2s;
    }

    .waveform-bar:nth-child(3) {
      animation-delay: 0.3s;
    }

    .waveform-bar:nth-child(4) {
      animation-delay: 0.4s;
    }

    .waveform-bar:nth-child(5) {
      animation-delay: 0.3s;
    }

    .waveform-bar:nth-child(6) {
      animation-delay: 0.2s;
    }

    .waveform-bar:nth-child(7) {
      animation-delay: 0.1s;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1.2rem;
    }

    /* 科技感聊天气泡 */
    .message {
      display: flex;
      gap: 0.8rem;
      max-width: 85%;
    }

    .message.user {
      align-self: flex-end;
      flex-direction: row-reverse;
    }

    .message.bot,
    .message.assistant {
      align-self: flex-start;
    }

    .avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      background: rgba(0, 240, 255, 0.1);
      border: 1px solid var(--accent-cyan);
      box-shadow: 0 0 8px rgba(0, 240, 255, 0.3);
      flex-shrink: 0;
    }

    .user .avatar {
      background: rgba(59, 130, 246, 0.15);
      border-color: #3b82f6;
      box-shadow: 0 0 8px rgba(59, 130, 246, 0.3);
    }

    .bubble-wrapper {
      display: flex;
      flex-direction: column;
    }

    .bubble {
      background: rgba(12, 22, 45, 0.8);
      border: 1px solid rgba(0, 240, 255, 0.15);
      padding: 0.75rem 1.1rem;
      border-radius: 0.25rem 1rem 1rem 1rem;
      font-size: 0.9rem;
      line-height: 1.5;
      color: var(--text-primary);
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
      transition: all 0.3s;
    }

    .user .bubble {
      background: rgba(15, 32, 67, 0.95);
      border-color: rgba(59, 130, 246, 0.5);
      border-radius: 1rem 0.25rem 1rem 1rem;
      box-shadow: 0 4px 12px rgba(59, 130, 246, 0.15);
    }

    .msg-translate-bar {
      font-family: var(--font-tech);
      font-size: 0.7rem !important;
      color: var(--accent-cyan) !important;
      margin-top: 4px;
      cursor: pointer;
      text-decoration: none !important;
      display: inline-block;
      opacity: 0.7;
      transition: 0.2s;
    }

    .msg-translate-bar:hover {
      opacity: 1;
      text-shadow: 0 0 5px var(--accent-cyan-glow);
    }

    /* 对话输入区域 */
    .input-area {
      padding: 1rem;
      border-top: 1px solid var(--border-cyan);
      display: flex;
      gap: 0.75rem;
      background: rgba(3, 7, 18, 0.5);
    }

    .input-area input {
      flex: 1;
      background: rgba(0, 10, 25, 0.85);
      border: 1px solid rgba(0, 240, 255, 0.25);
      border-radius: 4px;
      padding: 0.75rem 1.2rem;
      color: #fff;
      font-size: 0.9rem;
      font-family: var(--font-sans);
      outline: none;
      transition: all 0.3s;
    }

    .input-area input:focus {
      border-color: var(--accent-cyan);
      box-shadow: 0 0 12px rgba(0, 240, 255, 0.2);
    }

    .input-area button {
      background: rgba(0, 240, 255, 0.12);
      border: 1px solid var(--accent-cyan);
      color: var(--accent-cyan);
      border-radius: 4px;
      padding: 0 1.5rem;
      font-family: var(--font-tech);
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }

    .input-area button:hover:not(:disabled) {
      background: var(--accent-cyan);
      color: var(--bg-deep);
      box-shadow: 0 0 15px var(--accent-cyan-glow);
    }

    .input-area button:disabled {
      border-color: rgba(255, 255, 255, 0.1);
      color: rgba(255, 255, 255, 0.2);
      background: transparent;
      cursor: not-allowed;
    }

    .input-area .voice-btn {
      border-color: var(--accent-green);
      color: var(--accent-green);
      background: rgba(0, 255, 196, 0.1);
    }

    .input-area .voice-btn:hover:not(:disabled) {
      background: var(--accent-green);
      color: var(--bg-deep);
      box-shadow: 0 0 15px var(--accent-green-glow);
    }

    .input-area .voice-btn.recording {
      background: var(--accent-red);
      border-color: var(--accent-red);
      color: #fff;
      animation: pulse-glow-red 1s infinite;
    }

    /* ASR状态面板 */
    .asr-panel {
      display: none;
      padding: 0.75rem 1rem;
      border-top: 1px solid var(--border-cyan);
      background: rgba(0, 10, 25, 0.9);
      color: var(--text-secondary);
      font-family: var(--font-mono);
      font-size: 0.75rem;
      line-height: 1.5;
      border-radius: 0 0 0.5rem 0.5rem;
    }

    .asr-panel.visible {
      display: block;
    }

    .asr-panel strong {
      color: var(--accent-cyan);
    }

    /* ==================== 右侧控制栏 Sidebar Panel ==================== */
    .sidebar {
      gap: 1rem;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }

    .info-card {
      background: rgba(5, 12, 28, 0.6);
      border: 1px solid rgba(0, 240, 255, 0.15);
      border-radius: 0.5rem;
      padding: 0.9rem;
      display: flex;
      flex-direction: column;
      gap: 8px;
      transition: border-color 0.3s;
    }

    .info-card:hover {
      border-color: rgba(0, 240, 255, 0.35);
    }

    .info-title {
      font-family: var(--font-tech);
      font-size: 0.75rem;
      font-weight: 600;

      margin-bottom: 2px;
      display: flex;
      align-items: center;
    }

    .time-display {
      font-family: var(--font-mono);
      font-size: 1.3rem;
      font-weight: bold;
      letter-spacing: 1px;
      color: var(--text-primary);
      text-shadow: 0 0 10px var(--accent-cyan-glow);
      padding: 4px 0;
    }

    .time-control {
      display: flex;
      gap: 6px;
    }

    .time-control input {
      flex: 1;
      background: rgba(0, 10, 25, 0.8);
      border: 1px solid rgba(0, 240, 255, 0.2);
      color: #fff;
      border-radius: 4px;
      padding: 6px;
      font-size: 0.75rem;
      font-family: var(--font-mono);
      outline: none;
    }

    .time-control button {
      background: rgba(0, 240, 255, 0.12);
      border: 1px solid var(--accent-cyan);
      color: var(--accent-cyan);
      border-radius: 4px;
      padding: 6px 12px;
      cursor: pointer;
      font-family: var(--font-tech);
      font-size: 0.75rem;
      transition: 0.2s;
    }

    .time-control button:hover {
      background: var(--accent-cyan);
      color: var(--bg-deep);
      box-shadow: 0 0 10px var(--accent-cyan-glow);
    }

    .time-hint {
      font-size: 0.65rem;
      color: var(--text-secondary);
    }

    .field-row {
      display: flex;
      flex-direction: column;
      gap: 2px;
      padding: 6px 0;
      border-bottom: 1px solid rgba(0, 240, 255, 0.08);
      font-size: 0.8rem;
    }

    .field-row:last-child {
      border-bottom: none;
    }

    .field-label {
      color: var(--text-secondary);
      font-size: 0.7rem;
      font-family: var(--font-tech);
    }

    .field-value {
      font-weight: 500;
      color: #fff;
      word-break: break-all;
      white-space: pre-wrap;
      font-family: var(--font-mono);
    }

    .missing {
      color: var(--accent-amber);
      animation: pulse-warn 2s infinite ease-in-out;
      font-family: var(--font-mono);
      font-size: 0.75rem;
      padding: 4px 0;
      display: flex;
      align-items: center;
    }

    .badge {
      display: inline-block;
      background: rgba(0, 240, 255, 0.12);
      border: 1px solid var(--accent-cyan);
      color: var(--accent-cyan);
      border-radius: 2px;
      padding: 2px 6px;
      font-size: 0.65rem;
      font-family: var(--font-tech);
    }

    .badge.emergency {
      background: rgba(255, 0, 60, 0.2);
      border-color: var(--accent-red);
      color: var(--accent-red);
      animation: pulse-glow-red-text 1.5s infinite alternate;
    }

    /* 最终 JSON codeblock */
    .final-json {
      background: rgba(0, 5, 15, 0.95);
      border: 1px solid rgba(0, 240, 255, 0.15);
      padding: 8px;
      border-radius: 4px;
      font-family: var(--font-mono);
      font-size: 0.7rem;
      white-space: pre-wrap;
      word-break: break-all;
      max-height: 250px;
      overflow: auto;
      color: #aebfd4;
    }

    /* 重新开始按钮 */
    .reset-btn {
      background: rgba(255, 0, 60, 0.08);
      border: 1px solid rgba(255, 0, 60, 0.4);
      color: #ff003c;
      padding: 0.7rem 1rem;
      border-radius: 4px;
      cursor: pointer;
      text-align: center;
      font-family: var(--font-tech);
      font-size: 0.8rem;
      font-weight: 600;
      margin-top: 0.5rem;
      transition: all 0.3s;
    }

    .reset-btn:hover {
      background: var(--accent-red);
      color: white;
      box-shadow: 0 0 12px var(--accent-red-glow);
    }

    /* 历史记录按钮与列表 */
    .history-item {
      transition: background 0.2s;
      padding: 8px;
      border-bottom: 1px solid rgba(0, 240, 255, 0.08);
      cursor: pointer;
      border-radius: 4px;
    }

    .history-item:hover {
      background: rgba(0, 240, 255, 0.05);
    }

    /* ==================== 统一动画 Keyframes ==================== */
    @keyframes sweep {
      from {
        transform: rotate(0deg);
      }

      to {
        transform: rotate(360deg);
      }
    }

    @keyframes target-pulse {
      0% {
        opacity: 0;
        transform: scale(0.6);
      }

      20% {
        opacity: 1;
      }

      80% {
        opacity: 0.8;
      }

      100% {
        opacity: 0;
        transform: scale(1.6);
      }
    }

    @keyframes pulse-wave {

      0%,
      100% {
        transform: scaleY(0.4);
      }

      50% {
        transform: scaleY(1.8);
      }
    }

    @keyframes pulse-glow-green {

      0%,
      100% {
        box-shadow: 0 0 4px var(--accent-green);
      }

      50% {
        box-shadow: 0 0 12px var(--accent-green);
      }
    }

    @keyframes pulse-glow-red {

      0%,
      100% {
        box-shadow: 0 0 4px var(--accent-red);
      }

      50% {
        box-shadow: 0 0 15px var(--accent-red);
      }
    }

    @keyframes pulse-glow-red-text {
      0% {
        text-shadow: 0 0 2px var(--accent-red-glow);
      }

      100% {
        text-shadow: 0 0 8px var(--accent-red);
      }
    }

    @keyframes pulse-warn {

      0%,
      100% {
        opacity: 0.75;
      }

      50% {
        opacity: 1;
        color: #ffb700;
      }
    }

    /* 滚动条美化 */
    ::-webkit-scrollbar {
      width: 4px;
      height: 4px;
    }

      background: rgba(0, 0, 0, 0.1);
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(0, 240, 255, 0.2);
      border-radius: 2px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--accent-cyan);
    }

    /**
     * 校验翻译结果是否为脏数据，与后端 _is_dirty_translation 逻辑保持一致。
     */
    function isDirtyTranslation(targetLang, translated) {
      if (!translated) return true;
      const t = translated.trim();
      if (t.startsWith('{') || t.startsWith('[')) return true;
      if (targetLang === 'English' && /[\u4e00-\u9fa5]/.test(translated)) return true;
      return false;
    }

    /**
     * 公共翻译函数：带超时、重试、脏数据校验。
     * @param {string} text - 原文
     * @param {string} targetLang - 目标语言
     * @param {number} [retries=1] - 剩余重试次数
     * @returns {Promise<{translated: string, warning: string|null}>}
     */
    async function fetchTranslation(text, targetLang, retries = 1) {
      const TIMEOUT_MS = 30000; // 30s 超时
      const controller = new AbortController();
      const timerId = setTimeout(() => controller.abort(), TIMEOUT_MS);

      try {
        const res = await fetch(API_BASE + '/api/translate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text, target_lang: targetLang }),
          signal: controller.signal
        });
        clearTimeout(timerId);

        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();

        if (data.code === 200 && data.translated_text) {
          // 后端 quality_warning 或前端脏数据校验
          if (data.quality_warning || isDirtyTranslation(targetLang, data.translated_text)) {
            return { translated: data.translated_text, warning: 'low_quality' };
          }
          return { translated: data.translated_text, warning: null };
        }
        throw new Error(data.msg || 'empty translated_text');
      } catch (err) {
        clearTimeout(timerId);
        if (retries > 0) {
          // 自动重试一次
          await new Promise(r => setTimeout(r, 1500));
          return fetchTranslation(text, targetLang, retries - 1);
        }
        throw err;
      }
    }

    async function autoTranslateMessage(msgDiv) {
      const originalText = msgDiv.getAttribute('data-original');
      const btn = msgDiv.querySelector('.msg-translate-bar');
      const bubble = msgDiv.querySelector('.bubble');
      if (!originalText || !btn || !bubble) return;

      // 检查前端 DOM 缓存，若为脏数据则清除并重新翻译
      const cache = msgDiv.getAttribute('data-translation-cache');
      if (cache && !isDirtyTranslation('English', cache)) {
        bubble.innerHTML = renderMarkdown(cache).replace(/\n/g, '<br>');
        btn.innerText = I18N[currentLang].transOriginal;
        btn.setAttribute('data-translated', 'true');
        return;
      }
      if (cache) {
        // 清除脏缓存
        msgDiv.removeAttribute('data-translation-cache');
      }

      btn.innerText = I18N[currentLang].transTranslating;
      try {
        const { translated, warning } = await fetchTranslation(originalText, 'English');
        msgDiv.setAttribute('data-translation-cache', translated);
        if (currentLang === 'en') {
          bubble.innerHTML = renderMarkdown(translated).replace(/\n/g, '<br>');
          if (warning === 'low_quality') {
            btn.innerText = I18N[currentLang].transFallback;
            btn.setAttribute('data-translated', 'warn');
          } else {
            btn.innerText = I18N[currentLang].transOriginal;
            btn.setAttribute('data-translated', 'true');
          }
        }
      } catch (err) {
        btn.innerText = err.name === 'AbortError'
          ? I18N[currentLang].transNetError
          : I18N[currentLang].transFailed;
      }
    }

    function escapeHtml(str) {
      if (typeof str !== 'string') str = String(str);
      return str.replace(/[&<>]/g, function (m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
      });
    }

    function renderMarkdown(text) {
      const escapedText = escapeHtml(text);
      return escapedText
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/\*(.+?)\*/g, '<em>$1</em>');
    }

    function translateValue(key, val) {
      if (val === null || val === undefined) return currentLang === 'zh' ? '暂无' : 'None';

      if (Array.isArray(val)) {
        return val.map(item => translateValue(key, item)).join(currentLang === 'zh' ? ' / ' : ' / ');
      }

      if (typeof val === 'object') {
        if (val.lat !== undefined && val.lon !== undefined) {
          if (currentLang === 'zh') {
            return `北纬${val.lat}度, 东经${val.lon}度`;
          } else {
            const latStr = val.lat >= 0 ? `${val.lat}°N` : `${Math.abs(val.lat)}°S`;
            const lonStr = val.lon >= 0 ? `${val.lon}°E` : `${Math.abs(val.lon)}°W`;
            return `${latStr}, ${lonStr}`;
          }
        }
        return JSON.stringify(val);
      }

      const valStr = String(val);
      if (VALUES[valStr]) {
        return VALUES[valStr][currentLang];
      }
      return valStr;
    }

    function writeString(view, offset, string) {
      for (let i = 0; i < string.length; i++) {
        view.setUint8(offset + i, string.charCodeAt(i));
      }
    }

    // Convert float to 16bit PCM
    function floatTo16BitPCM(output, offset, input) {
      for (let i = 0; i < input.length; i++, offset += 2) {
        let s = Math.max(-1, Math.min(1, input[i]));
        output.setInt16(offset, s < 0 ? s * 0x8000 : s * 0x7fff, true);
      }
    }

    // Merge float32 audio chunks
    function mergeFloat32Chunks(chunks) {
      const length = chunks.reduce((sum, chunk) => sum + chunk.length, 0);
      const result = new Float32Array(length);
      let offset = 0;
      for (const chunk of chunks) {
        result.set(chunk, offset);
        offset += chunk.length;
      }
      return result;
    }

    // WAV audio encoder
    function encodeWav(samples, sampleRate) {
      const buffer = new ArrayBuffer(44 + samples.length * 2);
      const view = new DataView(buffer);

      writeString(view, 0, 'RIFF');
      view.setUint32(4, 36 + samples.length * 2, true);
      writeString(view, 8, 'WAVE');
      writeString(view, 12, 'fmt ');
      view.setUint32(16, 16, true);
      view.setUint16(20, 1, true);
      view.setUint16(22, 1, true);
      view.setUint32(24, sampleRate, true);
      view.setUint32(28, sampleRate * 2, true);
      view.setUint16(32, 2, true);
      view.setUint16(34, 16, true);
      writeString(view, 36, 'data');
      view.setUint32(40, samples.length * 2, true);
      floatTo16BitPCM(view, 44, samples);

      return new Blob([view], { type: 'audio/wav' });
    }

    async function startVoiceRecording() {
      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        throw new Error(I18N[currentLang].voiceNotSupport);
      }

      mediaStream = await navigator.mediaDevices.getUserMedia({
        audio: {
          echoCancellation: true,
          noiseSuppression: true,
          autoGainControl: true
        }
      });

      audioContext = new (window.AudioContext || window.webkitAudioContext)();
      recordingSampleRate = audioContext.sampleRate;
      recorderSource = audioContext.createMediaStreamSource(mediaStream);
      recorderProcessor = audioContext.createScriptProcessor(4096, 1, 1);
      recordedChunks = [];

      recorderProcessor.onaudioprocess = (event) => {
        const input = event.inputBuffer.getChannelData(0);
        recordedChunks.push(new Float32Array(input));
      };

      recorderSource.connect(recorderProcessor);
      recorderProcessor.connect(audioContext.destination);

      isRecording = true;
      voiceBtn.classList.add('recording');
      voiceBtn.textContent = I18N[currentLang].voiceStop;
      setAsrStatus(I18N[currentLang].voiceRecording);

      // Show center pulsing visual
      document.getElementById("audioWaveformWrapper").style.display = "flex";
    }

      isRecording = false;
      voiceBtn.classList.remove('recording');
      voiceBtn.textContent = I18N[currentLang].voiceBtn;

      // Hide center pulsing visual
      document.getElementById("audioWaveformWrapper").style.display = "none";

      if (recorderProcessor) recorderProcessor.disconnect();
      if (recorderSource) recorderSource.disconnect();
      if (mediaStream) mediaStream.getTracks().forEach(track => track.stop());
      if (audioContext) await audioContext.close();

      recorderProcessor = null;
      recorderSource = null;
      mediaStream = null;
      audioContext = null;

      if (!recordedChunks.length) {
        setAsrStatus(I18N[currentLang].voiceNoAudio);
        return;
      }

      const samples = mergeFloat32Chunks(recordedChunks);
      const audioBlob = encodeWav(samples, recordingSampleRate);

      setAsrStatus(I18N[currentLang].voiceTranscribing);
      voiceBtn.disabled = true;

      try {
        const data = await uploadAudioForAsr(audioBlob);
        const transcript = (data.corrected_text || data.text || data.transcript || '').trim();
        const directToLlm = data.direct_to_llm !== false;

        if (!transcript) {
          setAsrStatus(I18N[currentLang].voiceEmptyText);
          return;
        }

        if (directToLlm) {
          setAsrStatus(renderAsrNormalization(data, true), true);
          await sendMessage(transcript, { source: 'voice' });
        } else {
          messageInput.value = transcript;
          setAsrStatus(renderAsrNormalization(data, false), true);
          messageInput.focus();
        }
      } catch (err) {
        setAsrStatus(`${I18N[currentLang].voiceError}${escapeHtml(err.message || err)}`);
      } finally {
        if (!isDone) voiceBtn.disabled = false;
      }
    }

    async function toggleVoiceRecording() {
      try {
        if (isRecording) {
          await stopVoiceRecording();
        } else {
          await startVoiceRecording();
        }
      } catch (err) {
        isRecording = false;
        voiceBtn.classList.remove('recording');
        voiceBtn.textContent = I18N[currentLang].voiceBtn;
        voiceBtn.disabled = false;
        setAsrStatus(`${I18N[currentLang].voiceNotAvailable}${escapeHtml(err.message || err)}`);
      }
    }

    // ==================== 历史记录功能 ====================
    async function loadHistoryList() {
      try {
        const res = await fetch(API_BASE + '/api/history/list');
        const data = await res.json();
        if (data.code !== 200) return;
        const listDiv = document.getElementById('historyList');
        if (data.data.length === 0) {
          listDiv.innerHTML = `<div style="padding:8px; color:var(--text-secondary);">${I18N[currentLang].historyNone}</div>`;
        } else {
          let html = '';
          for (const rec of data.data) {
            const localizedType = translateValue('task_type_key', rec.task_type);
            html += `
          <div class="history-item" data-id="${rec.id}" style="padding:6px; border-bottom:1px solid rgba(0, 240, 255, 0.08); cursor:pointer; font-size:0.75rem;">
            <div><strong>${escapeHtml(rec.task_id)}</strong> (${escapeHtml(localizedType)})</div>
            <div style="font-size:0.65rem; color:var(--text-secondary);">${new Date(rec.saved_at).toLocaleString()}</div>
          </div>
        `;
          }
          listDiv.innerHTML = html;
          document.querySelectorAll('.history-item').forEach(el => {
            el.addEventListener('click', async (e) => {
              const hid = el.getAttribute('data-id');
              await restoreHistory(hid);
              listDiv.style.display = 'none';
            });
          });
        }
        if (listDiv.style.display === 'none') {
          listDiv.style.display = 'block';
        } else {
          listDiv.style.display = 'none';
        }
      } catch (err) {
        console.error('加载历史列表失败', err);
      }
    }

    async function restoreHistory(historyId) {
      let effectiveSessionId = sessionId;
      if (!effectiveSessionId) {
        effectiveSessionId = 'temp_' + Date.now();
      }

      try {
        const res = await fetch(API_BASE + '/api/history/load', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ history_id: historyId, session_id: effectiveSessionId })
        });
        const data = await res.json();
        if (data.code !== 200) {
          alert(I18N[currentLang].restoreFailed + (data.msg || 'unknown'));
          return;
        }
        if (data.session_id) sessionId = data.session_id;
        else sessionId = effectiveSessionId;

        messageContainer.innerHTML = '';
        for (const msg of data.conversation_history) {
          addMessage(msg.role, msg.content);
        }

        const isCompleted = (data.phase === 'done');
        updateSidebar({
          task_type: data.task_type,
          emergency: data.mode === 'emergency',
          collected: data.built_json,
          missing: data.missing,
          final_json: isCompleted ? data.built_json : null
        });

        if (isCompleted) {
          document.getElementById('resultCard').style.display = 'block';
          document.getElementById('finalJson').innerText = JSON.stringify(data.built_json, null, 2);
          messageInput.disabled = true;
          sendBtn.disabled = true;
          addMessage('bot', I18N[currentLang].historyLoadedReadOnly);
        } else {
          document.getElementById('resultCard').style.display = 'none';
          messageInput.disabled = false;
          sendBtn.disabled = false;
        }

        document.getElementById('historyList').style.display = 'none';
      } catch (err) {
        console.error('还原历史失败', err);
        alert(I18N[currentLang].restoreNetError);
      }
    }

    async function sendMessage(msg, options = {}) {
      if (!msg.trim() || isDone) return;
      const source = options.source || 'text';
      addMessage('user', msg);
      messageInput.value = '';
      sendBtn.disabled = true;
      voiceBtn.disabled = true;

      try {
        const res = await fetch(API_BASE + '/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ session_id: sessionId, message: msg, source })
        });

        let rawText = '';
        try {
          rawText = await res.text();
        } catch (e) {
          addMessage('bot', `响应读取失败 (HTTP ${res.status})`);
          return;
        }

        let data = {};
        try {
          data = JSON.parse(rawText);
        } catch (e) {
          addMessage('bot', `服务响应非标准格式 (HTTP ${res.status})`);
          return;
        }

        if (!res.ok || data.ok === false || (data.code && data.code !== 200)) {
          const errMsg = data.msg || data.message || '请求处理异常';
          const reqId = data.request_id ? ` [request_id: ${data.request_id}]` : '';
          const retryHint = data.retryable ? ' (可尝试重试)' : '';
          addMessage('bot', `⛔ 错误 (${data.error || 'ServerErr'}): ${errMsg}${reqId}${retryHint}`);
          return;
        }

        if (!sessionId && data.session_id) sessionId = data.session_id;

        if (data.reply) {
          addMessage('bot', data.reply);
        }
        if (data.done) {
          isDone = true;
          if (data.rejected) {
            addMessage('bot', I18N[currentLang].taskRejectedMsg);
          } else if (data.final_json) {
            addMessage('bot', I18N[currentLang].taskSuccessMsg);
            addMessage('bot', '```json\n' + JSON.stringify(data.final_json, null, 2) + '\n```');
          }
        }
        updateSidebar(data);
      } catch (err) {
        addMessage('bot', I18N[currentLang].networkError);
      } finally {
        sendBtn.disabled = isDone;
        voiceBtn.disabled = isDone;
        messageInput.focus();
      }
    }

    async function reset() {
      sendBtn.disabled = true;
      messageInput.disabled = true;

      if (sessionId) {
        try {
          await fetch(API_BASE + '/api/reset', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ session_id: sessionId })
          });
        } catch (err) {
          console.error('Reset failed', err);
        }
      }
      isDone = false;
      messageContainer.innerHTML = '';
      addMessage('bot', I18N[currentLang].welcomeMsg);
      document.getElementById('taskInfo').innerHTML = '-';
      document.getElementById('collectedFields').innerHTML = I18N[currentLang].none;
      document.getElementById('missingFields').innerHTML = '-';
      document.getElementById('resultCard').style.display = 'none';
      document.getElementById('historyList').style.display = 'none';
      messageInput.value = '';

      sendBtn.disabled = false;
      messageInput.disabled = false;
      voiceBtn.disabled = false;
      voiceBtn.classList.remove('recording');
      voiceBtn.textContent = I18N[currentLang].voiceBtn;
      setAsrStatus('', false);
      messageInput.focus();

    }

    sendBtn.addEventListener('click', () => sendMessage(messageInput.value));
    messageInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(messageInput.value); });
    voiceBtn.addEventListener('click', toggleVoiceRecording);
    resetBtn.addEventListener('click', reset);
    document.getElementById('setTimeBtn').addEventListener('click', setSimulatedTime);
    document.getElementById('historyBtn').addEventListener('click', loadHistoryList);



    reset();

    updateSimulatedTime(true);
    if (timeUpdateInterval) clearInterval(timeUpdateInterval);
    timeUpdateInterval = setInterval(() => updateSimulatedTime(false), 1000);
  </script>
</body>

</html>
