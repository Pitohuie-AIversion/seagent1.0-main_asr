# ==============================================================================
# ROV 设备知识库 — 可通过新增条目扩展
# 数据来源: https://sealien.net/products.html
# ==============================================================================

robot_categories:
  observation:
    label: "观察级ROV"
    description: "轻型，主要搭载摄像和传感器，适用于管缆巡检、环境调查等非接触作业"
  work:
    label: "工作级ROV"
    description: "重型，配备机械臂和液压工具，适用于水下干预、阀门操作、安装维修等"
  seabed_tractor:
    label: "海底拖拉机"
    description: "履带式海底行走设备，用于软至中等土壤中的长距离管缆铺设与埋设作业，不依赖脐带缆悬停"
  survey:
    label: "调查型AUV"
    description: "无缆自主水下航行器，搭载导航、探测与环境传感器，适用于大范围海洋调查、测绘与监测作业"

robot_fleet:

  - model: "sealien_work_class"
    aliases: ["工作级", "作业级", "sealien work", "Sealien工作级", "新一代工作级"]
    category: "work"
    category_name: "工作级"
    full_name: "sealien_work_class"
    max_depth_m: 4000
    dimensions: "3.6m×2m×2m"
    weight_in_air_kg: 4750
    power_hp: 250
    lift_capacity_kg: 4000
    Payload_kg: 350
    forbidden_seabed: "soft"
    typical_payload:
      - "液压扭矩工具"
      - "阀门操作接口工具"
      - "机械臂"
      - "清洁刷"
      - "防喷工具包"
    brief: "Sealien新一代工作级ROV，采用全新控制架构和升级硬件，兼容性优异。适用于深水采油树阀门插拔、管线干预等工作级作业，最大工作水深4000m。"

  - model: "sealien_cable_pipeline"
    aliases: ["管缆ROV", "管道ROV", "电缆ROV", "管缆作业ROV", "Sealien管缆"]
    category: "work"
    category_name: "工作级"
    full_name: "sealien_cable_pipeline"
    max_depth_m: 2500
    seabed_requirement: "hard"   # 适用复杂路线和硬海床
    dimensions: "customizable"
    weight_in_air_ton: "ROV+Skid Mode≈12.5t ROV+Track Mode≈13.5t"
    weight_in_seawater_ton: "ROV+Skid Mode≈0.5t ROV+Track Mode≈2t"
    typical_payload:
      - "管缆铺设系统"
      - "管道追踪器"
      - "埋设犁"
      - "张力监测系统"
      - "高清摄像系统"
    brief: "Sealien管缆作业ROV，专为管缆同步铺设埋设或后埋设设计，支持复杂路线规划，适用于硬海床环境，最大工作水深2500m。"

  - model: "sealien_inspection"
    aliases: ["观察级", "巡检ROV", "检查ROV", "inspection", "Sealien观察级", "Sealien巡检"]
    category: "observation"
    category_name: "观察级"
    full_name: "sealien_inspection"
    max_depth_m: 600
    dimensions: "12m×8.5m×6m"
    payload_capacity_kg: 16
    frame_lifting_capacity_kg: 100
    weight_in_air_kg: 160
    forbidden_seabed: "soft"
    typical_payload:
      - "高清/4K摄像系统"
      - "CP（阴极保护）探测仪"
      - "管道追踪器"
      - "多波束声呐"
      - "侧扫声呐"
      - "激光测量尺"
    brief: "Sealien观察级ROV，用于水下视觉检查、日常监测、损伤评估和海洋科研，搭载多种探测传感器，是管缆巡检任务的标准机型，最大工作水深600m。"

  - model: "taurus_tractor"
    aliases: ["金牛座", "拖拉机", "埋设机", "Taurus", "海底拖拉机", "taurus"]
    category: "seabed_tractor"
    category_name: "海底拖拉机"
    full_name: "taurus_tractor"
    max_depth_m: 500
    seabed_requirement: "soft_to_medium"   # 软至中等土壤
    #working_depth_m: 500
    dimensions: "18m×6.9m×4.8m"
    weight_in_air_t: 35
    wet_weight_t: 28
    max_cable_diameter_mm: 450
    max_burial_depth_m: 5
    max_driving_speed_m_per_hr: 1500
    operating_speed_m_per_hr: "50-750"
    adapted_soil_type: ["砂", "粉砂", "硬黏土", "砂砾土"]
    ground_pressure_kPa: "6-14"
    whole_system_power_hp: 1600
    min_turning_radius_m: 25
    main_lift_point_t: 60
    bellmouth_desc: "安装于拖拉机前部，用于引导管缆并监测其曲率"
    min_lifting_height_m: 1
    main_jetting_configuration: "双射水刀，具备独立升降能力，配备下向、内向及后向喷嘴，搭载独立抑沉装置"
    trenching_depth_m: 5
    adaptable_cable_diameter_mm: "140-450"
    forbidden_seabed: "soft"
    typical_payload:
      - "埋设犁"
      - "射水系统"
      - "管缆张力监测系统"
      - "高清摄像系统"
    brief: "Taurus海底拖拉机，履带式海底拖拉机，用于软至中等土壤中的长距离管缆后埋设或同步铺设埋设，与管缆作业ROV形成互补（硬海床用ROV，软土用拖拉机），最大工作水深500m。"

  - model: "sealien_survey_auv"
    aliases: ["调查型AUV", "AUV", "自主水下航行器", "Sealien AUV"]
    category: "observation"
    category_name: "观察级"
    full_name: "sealien_survey_auv"
    max_depth_m: 1000
    dimensions: "3.24×3.6m"
    max_range_km: 500
    max_speed_knots: 6
    payload_capacity_kg: 30
    forbidden_seabed: "soft"
    typical_payload:
      - "导航类（光纤INS、DVL、磁力仪、深度计）"
      - "探测类（前视声呐、侧扫声呐、水听器、合成孔径声呐）"
      - "环境类（CTD温盐深传感器、溶解氧传感器、浊度传感器）"
      - "成像类（4K/1080P水下相机）"
    brief: "Sealien调查型AUV，无缆自主水下航行器，可搭载导航、探测、环境及成像类传感器，适用于大范围海洋调查、测绘与监测作业，最大工作水深1000m，最大续航里程500km。"