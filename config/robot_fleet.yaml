# ==============================================================================
# 机器人设备知识库草稿
#
# 检索分层：
# 1. robot_classes：机器人大类，作为 task_schemas.allowed_robot_classes 的合法取值。
# 2. robot_families：机器人族，表示某类机器人是什么、具备什么能力。
# 3. model_variants：型号规格层，存放不同马力规格下会变化的硬件参数。
# 4. fleet_units：实体设备层，表示仓库或现场实际存在的某一台设备。
#
# 字段说明：
# - full_name：标准中文名称；robot_families 中是 aliases 映射后的规范名称，model_variants 中是规格标准名称。
# - robot_class：指向 robot_classes 的 key，用于限定机器人所属大类。
# - capabilities：机器人族支持的工作类型能力，用于匹配 task_schemas.required_capabilities，例如 inspection / cable_burial / tree_operation。
# - aliases：用户输入别名映射，用于把口语名称映射到正确的 robot_families key。
# - family_id：model_variants 反向指向 robot_families 的 key。
# - hard_params：该规格下的统一硬参数接口；所有机器人保持同一套 key；未知时置为 null，明确不适用时置为 "不适用"，列表型字段未知或不限制时置为 []。
#   基础边界：
#   - max_depth_m：最大作业水深，单位 m。
#   - max_burial_depth_m：最大埋设深度，单位 m；不具备埋设能力时置为 "不适用"；适用但未知时置为 null。
#   - max_operating_sea_state_level：最大可工作海况等级；适用但未知时置为 null。
#   - dimensions：设备尺寸，暂时保留字符串。
#   - diameter_mm：AUV艇体口径/直径，单位 mm；仅AUV适用，其他机器人置为 "不适用"。
#   - weight_in_air_kg：空气中重量，单位 kg；未知时置为 null。
#   - power_hp：最大/标称功率；未知时置为 null。AUV 的“节”是速度单位，不写入 power_hp。
#   环境/载荷边界：
#   - supported_seabed：可支持作业的海床底质类型，例如 hard / soft；未知时置为空列表。
#   - supported_payloads：可支持/可搭载的设备或工具；未知或待补充时置为空列表。
#   - max_payload_weight_kg：最大载荷重量，单位 kg；未知时置为 null。
#   - structural_lifting_capacity_kg：结构/底盘/框架提升能力，单位 kg；适用但未知时置为 null；不适用时置为 "不适用"。
#   运动边界：
#   - min_turning_radius_m：最小转弯半径，单位 m；未知时置为 null。
#   - max_travel_speed_kn：最大航行/行走速度，单位节；未知时置为 null。
#   - max_operating_speed_kn：最大作业速度，单位节；未知时置为 null。
#   续航边界：
#   - max_range_km：最大航程，单位 km；未知时置为 null；不适用时置为 "不适用"。
#   - max_endurance_h：最大续航时间，单位 h；未知时置为 null；不适用时置为 "不适用"。
# - unit_id：实体设备唯一编号，用于调度、状态查询和资源占用。
# - variant_id：实体设备所属规格，必须指向 model_variants 的 key。
# - serial_no：同规格下的实体序号，例如 001 / 002 / 003。
# - display_name：实体设备展示名。
# - status_ref：外部状态系统的查询 key；没有接入状态系统时可先与 unit_id 相同。
#
# 结构原则：
# 1. robot_families 只放分类、能力、别名等检索语义。
# 2. model_variants 使用独立规格条目，格式参考 7.md。
# 3. 每个机器人族先只保留一个马力规格，后续新增马力时复制同结构即可。
# 4. fleet_units 是可选调度层；如果只推荐机器人类型或规格，可以先不读取它。
#
# 检索链路：
# 1. task_schemas 给出 allowed_robot_classes 和 required_capabilities。
# 2. 在 robot_families 中筛选：
#    - robot_class 必须属于 allowed_robot_classes
#    - capabilities 必须覆盖 required_capabilities
# 3. 得到 robot_families 的 key 后，用 model_variants[*].family_id 找规格。
# 4. 使用 hard_params 进行水深、尺寸等硬件约束判断，使用 supported_payloads 判断可搭载设备。
# 5. 如果需要派发具体设备，再用 model_variants 的 key 匹配 fleet_units[*].variant_id。
# ==============================================================================

robot_classes:
  cable_burial_robot:
    full_name: "管缆埋设机器人"

  work_class_rov:
    full_name: "工作级ROV"

  observation_rov:
    full_name: "观察级ROV"

  auv:
    full_name: "AUV"

robot_families:
  crawler_heavy_seabed_robot:
    full_name: "履带式海底重载作业机器人"
    robot_class: "cable_burial_robot"
    capabilities: ["cable_burial"]
    aliases: ["履带式", "履带式机器人", "履带式重载机器人", "履带式海底机器人", "履带拖拉机", "海底履带拖拉机", "金牛座", "履带埋缆机器人", "履带式管缆埋设机器人"]
    brief: |
      履带式海底重载作业机器人为智能型海底管缆埋设装备，主要适用于大埋深工况及恶劣海况，完成海底管线开沟、掩埋施工。设备配备两条大接地面积履带，依托履带机构在海床行进;主机搭载大功率喷射系统，可切换链锯作业模块，最大开沟深度可达5米，确保光电缆、复合缆按设计深度埋设，为海洋能源管线提供可靠的物理防护。
      该机器人(简称“金牛座”)额定功率1200kW，是亚洲现阶段功率最大、完全国产自主可控的深海重载作业装备。行走机构采用宽履带低接地比压结构，在深海松软沉积物地层中仍可维持充足牵引力，规避沉陷、打滑问题，满足5级海况下的常态化稳定作业。开沟系统支持高压射流和链锯模块装配，可结合前期地层评估结果匹配破土工艺，适配砂土、黏土、软岩等复杂地层，成型沟槽连续、尺寸均匀。整机动力与信号传输采用全双工光纤方案，将大功率输电与低延迟高清影像回传整合至单根脐带缆，保障长距离大功率作业的供电与通信可靠性。
      该设备已投入国内近海大容量海上风电送出等标杆工程，胜任复杂海床条件下大埋深、长距离连续埋设作业。后续将深耕深远海应用场景，集成海底原位地质建模与智能决策引擎，实现海底异常体自主避让、开沟速度及能耗动态调控，并持续迭代为无支持母船远程智控装备，成为深远海能源输送基础设施建设的核心自主式海底作业机器人。

  towed_heavy_seabed_robot:
    full_name: "拖曳式海底重载作业机器人"
    robot_class: "cable_burial_robot"
    capabilities: ["cable_burial"]
    aliases: ["拖曳式", "拖曳式机器人", "拖曳式重载机器人", "拖曳式海底机器人", "拖曳拖拉机", "海底拖曳拖拉机", "御夫座", "拖曳埋缆机器人", "拖曳式管缆埋设机器人"]
    brief: |
      拖曳式海底重载作业机器人，是适配海底管缆工程的专用深海装备，主打开沟、埋设、防护一体化施工。设备由作业母船拖曳航行，可完成海底电缆、光缆、脐带缆一站式敷设掩埋作业。依托射流系统在海床精准开槽，并同步沉缆回填，一体化连续作业模式，规避二次施工扰动造成的管缆破损，是海上风电、跨海通信海底管线建设的核心施工装备。
      该机器人长13米、宽5.4米、高3.2米，整机自重25吨，依托重力压载稳坐海床，适配3-650米深浅全水域作业。设备搭载可变构型高压射流开沟矩阵，可根据海床地质动态调节喷射动能，最大埋设深度可达6米，低扰动开槽有效减少泥沙回淤;搭配多维抗扭框架与双重防腐防护结构，适配泥质、沙质等复杂海床。配套脐带缆智能管控系统，自适应调节张力，削弱海浪颠簸带来的作业影响。
      目前设备已投入国内风电场工程，作业性能稳定可靠。后续我们将赋能设备海底智能感知、自主纠偏功能，依托地声识别、多波束实时成像技术，打造数字化施工体系，搭建全流程数字孪生系统，逐步迭代升级，最终实现无人值守式自主埋设作业。

  special_work_class_robot:
    full_name: "特种工作级深海机器人"
    robot_class: "cable_burial_robot"
    capabilities: ["cable_burial"]
    aliases: ["特种型", "特种工作级机器人", "特种工作级ROV", "特种悬浮式机器人", "特种履带式机器人", "凤凰座", "悬浮履带双模块ROV", "悬浮式管缆埋设机器人", "管缆埋设ROV"]
    brief: |
      悬浮式深海作业机器人是面向3000米水深打造的特种悬浮式ROV，集悬浮行进、坐底爬行双重作业模式于一体。开展喷冲埋设作业时，设备可保持悬浮状态沿管缆路径精准跟进，完成管缆后埋设施工;面对复杂地形或精确定位需求时，可坐底切换履带行走模式。该装备摆脱了水面船舶航迹约束，可独立完成路径跟踪与局部修复，是深海光缆、深水脐带缆运维作业的专用设备。
      该机器人底部行走系统采用模块化设计，可在甲板端提前换装滑橇或履带组件，适配不同施工工况。ROV搭配滑橇时，水中重量仅0.5吨，惯性小、机动性能优异;换装履带模组后，水中重量增至2吨，接地附着能力大幅提升，可在坚硬、凹凸不平的海床稳定开沟。其喷射刀支持倾角调节，最大下探深度3米，系统依托埋深数据形成闭环控制，保障沟槽平整均匀。
      目前该装备已应用于深水油气管道后埋设、国际海缆抢修等高端工程，可在不损伤在管缆的前提下完成精细化施工。未来设备将升级带电管缆非接触电磁探测导航功能，并联动自动接头盒等工具，打造集搜缆、定深、埋设、检测于一体的全流程自主作业平台，全面升级深海管缆全生命周期运维保障体系。

  general_work_class_rov:
    full_name: "通用工作级深海机器人"
    robot_class: "work_class_rov"
    capabilities: ["tree_operation"]
    aliases: ["通用型", "通用工作级机器人", "通用工作级ROV", "通用悬浮式ROV", "通用深海机器人", "通用型ROV", "通用悬浮式机器人", "通用水下作业机器人", "奇点"]
    brief: |
      通用工作级深海机器人，属于可覆盖3000米全海深作业的工作级ROV，性能可拓展至6000米水深。设备采用中性浮力设计，能够全域悬浮、六向自由机动，相比坐底式设备作业范围更广、灵活性更强。通过换装多功能作业工具模块，可开展构件安装、阀门操控、样品采集、管线检修等重载精密作业，是深海资源勘探、水下设施运维的移动式核心工作站。
      机器人搭载全新一代智能控制系统，结合神经网络大模型与多维感知阵列，融合声呐、激光雷达、光学成像及导航数据，实现水下目标半自主识别与路径规划。整机拥有250kg额定载荷与4000kg底盘提升力，搭配大功率电液驱动及环形推进结构，抗扰能力强，可在复杂水流下稳定悬停定位。模块化舱体支持工具快速换装，单次下潜可完成多项作业任务，有效降低作业成本、提升作业效率。
      目前该机型已广泛应用于深海油气运维、水下生产调试、海洋矿产勘查等领域，熟练完成水下构件对接插拔等高难度作业。未来将迭代升级为常驻式水下智能系统，依托海底充电基站实现长周期无人巡检;依托自主学习认知模型自主研判设施状态并开展运维作业，减少高危人工潜水作业，助推深海工程向无人化、智能化运维方向升级。

  light_work_class_rov:
    full_name: "轻型工作级深海机器人"
    robot_class: "observation_rov"
    capabilities: ["inspection"]
    aliases: ["轻型", "轻型工作级机器人", "轻型工作级ROV", "轻型悬浮式ROV", "轻型深海机器人", "轻型ROV", "轻型悬浮式机器人", "天鹰座", "轻型巡检ROV", "轻型巡检机器人"]
    brief: |
      轻型工作级深海机器人是深海智人专为600米水深场景研发的紧凑型作业级ROV。设备聚焦高频次、快响应的水下勘察与轻量化干预任务，主打高机动、轻量化作业优势，适用于坝体闸门检测、船体专项探伤、海洋牧场巡检及浅水科考采样等精细化场景，充当水下工程的“侦察兵”与“体检师”。
      该机器人(简称“天鹰座”)自重仅200千克，设计载荷≥16千克，底盘承载提升力可达100千克。依托高度集成的电驱推进模组与轻量化传动结构，设备在小巧体型下，实现超自重半数的提拉力，同级别产品作业性能优势突出。整机高集成化设计，收纳于长1.2米，宽0.85米，高0.6米的流线型机身之中。推进系统融合仿生鳍翼与矢量推力技术，可在狭小复杂的水下结构内完成全姿态悬停与平移作业，有效降低水流扰动。设备标配集成光电舱，融合低照度彩色摄像、激光测距及多波束成像声呐功能，即便在浑浊低能见度水域，也能精准重构水下目标三维点云模型。
      目前，该机器人已批量投用于海上风电设施检测、水下环境勘测等民用高端场景，支持即投即用，大幅提升浅水作业效率。未来产品将深耕智能化升级，依托水声通信搭建多机编队组网体系，完成大型水下结构立体化同步巡检;同时搭载边缘侧智能诊断模型，自动生成缺陷热力图。以分布式智能感知节点的定位，推动水下作业从人工远程操控，进阶为无人自主值守模式。

  observation_rov:
    full_name: "观察级深海机器人"
    robot_class: "observation_rov"
    capabilities: ["inspection"]
    aliases: ["观察级", "观察级机器人", "观察级ROV", "观察型ROV", "检查ROV", "深海观察机器人", "巡检机器人", "巡检ROV", "深海巡检ROV", "深海巡检机器人", "深海观察型ROV", "深海观察型机器人", "深海观察级ROV", "深海观察级机器人"]
    brief: 观察级深海机器人是一类具备水下观察与监测能力的轻量化巡检型ROV，依托灵活机动能力和高清成像系统，可用于海洋环境观察、水下生态研究、海底设施目视检查、潜水员辅助观察和浅海科学探索等场景。该类设备适用于精细化巡检，也可在大范围水下作业前承担环境提前勘探、路径初步识别、目标区域观察和异常点确认等任务，为后续施工、巡检或干预作业提供影像和环境感知信息。观察级深海机器人额定作业水深为600msw，载荷能力≥16kg，框架提升能力100kg，可搭载5自由度机械臂，并具备高推力推进系统以适应较强水流环境；但其定位仍为观察、监测和轻量辅助作业平台，不应承担大功率开沟、重型搬运、复杂机械干预或采油树面板操作等任务。

  autonomous_underwater_vehicle:
    full_name: "水下无人自主航行器"
    robot_class: "auv"
    capabilities: ["inspection"]
    aliases: ["AUV", "自主型", "水下无人自主航行器", "水下无人自主机器人", "自主水下航行器", "无人潜航器", "自主潜航器", "调查型AUV", "水下巡检航行器"]
    brief: |
      AUV是面向海洋调查、水下测绘、目标探测与工程巡检任务的自主水下航行器平台。平台采用国际12.75英寸级中型AUV的总体构型理念，结合模块化耐压舱段、低阻力流线型艇体与任务载荷可重构设计，具备在中深水环境下执行长航程、自主化、低干预作业任务的能力。
      该平台适用于近海深水区、大陆架海域、港口航道、湖库深水区及复杂海底地形环境。系统可根据不同任务剖面配置导航、通信、测绘、探测与环境感知载荷，实现定深航行、定高测绘、航迹跟踪、区域覆盖搜索、目标识别与水下数据采集等功能。搭载VBS可变浮力系统，可自适应完成潜浮、悬停、低速观测与长距离巡航姿态调节;支持十字舵、水平舵双构型切换，兼顾复杂水域机动性能与高精度测线稳定航行。
      具备光纤直连遥控模式在常规自主作业基础上实现人在回路实时操控，可回传姿态、能源、声呐、视频及系统状态数据，支持推进、舵面、姿态及任务载荷远程调控与紧急接管。可按需求灵活切换作业形态，完美适配复杂结构高精度巡检，大幅提升平台作业容错性与场景适配能力。

model_variants:
  crawler_heavy_seabed_robot_1600hp:
    family_id: "crawler_heavy_seabed_robot"
    full_name: "履带式海底重载作业机器人 1600HP"
    aliases: ["履带式海底重载作业机器人1600HP", "履带式重载机器人1600HP", "履带式1600HP", "1600HP履带式机器人", "金牛座1600HP"]
    hard_params:
