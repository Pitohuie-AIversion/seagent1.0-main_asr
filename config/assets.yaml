# ==============================================================================
# 支持船只知识库 — 可扩展
# ==============================================================================

vessels:
  - id: "海洋石油681"
    aliases: ["681", "HYSY681", "海油681"]
    full_name: "海洋石油681"
    type: "DSV"
    description: "深水综合作业船，配备动力定位系统DP3，支持饱和潜水和ROV作业，适用深水管缆巡检及干预任务。"
    available: true

  - id: "DSV-Oceanic"
    aliases: ["Oceanic", "oceanic", "大洋"]
    full_name: "DSV-Oceanic"
    type: "DSV"
    description: "外籍深水支持船，动力定位DP2，主要承担深水ROV干预作业支持，携带重型工作级ROV。"
    available: true

  - id: "海洋石油286"
    aliases: ["286", "HYSY286"]
    full_name: "海洋石油286"
    type: "SURVEY"
    description: "综合物探船，适合管缆调查、海底测量等观察作业支持任务。"
    available: true

  - id: "海洋石油708"
    aliases: ["708", "HYSY708"]
    full_name: "海洋石油708"
    type: "DSV"
    description: "深水铺管起重船，配备ROV支持系统，适合深水安装及干预作业。"
    available: false   # 当前不可用


# ==============================================================================
# 管缆类型配置 — 可扩展
# ==============================================================================

cable_types:
  - id: "submarine_pipeline"
    label: "海底油气管道"
    aliases: ["油气管道", "管道", "输油管", "油管", "气管", "submarine pipeline"]
  - id: "power_cable"
    label: "电力电缆"
    aliases: ["电缆", "电力缆", "power cable", "电力线"]
  - id: "fiber_optic"
    label: "光纤通信缆"
    aliases: ["光纤", "光缆", "通信缆", "fiber", "optical cable"]


# ==============================================================================
# 携带工具选项 — 必须从此列表中选择（可扩展）
