  pipeline_inspection:
    common:
      - "高清水下摄像机"
      - "LED水下照明灯"
      - "激光标尺"
      - "前视声呐"
      - "INS惯性导航系统"
      - "DVL多普勒测速仪"
      - "USBL定位设备"
      - "深度传感器"
