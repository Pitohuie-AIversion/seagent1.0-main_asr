  tree_valve_operation:
    common:
      - "液压扭矩工具"
      - "阀门操作接口工具"
      - "机械臂"
      - "清洁刷"
      - "防喷工具包"
    description: "采油树阀门插拔常用工具，建议根据插拔目的选择组合"


