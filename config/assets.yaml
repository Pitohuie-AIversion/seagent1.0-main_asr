  pipeline_burial:
    common:
      - "高压水射流喷冲埋设模块"
      - "机械切割开沟模块（可选）"
      - "海缆压埋/保持装置"
      - "埋深控制装置"
      - "TSS管缆跟踪传感器"
      - "高清水下摄像机"
      - "LED水下照明灯"
      - "激光标尺（可选）"
      - "前视声呐"
      - "成像声呐"
      - "多波束声呐（可选）"
      - "USBL定位设备"
      - "水下定位信标（可选）"
      - "声学应答器（可选）"
      - "海床地质探测设备（可选）"
      - "腐蚀检测设备（可选）"
      - "温度/压力传感器模块（可选）"
    description: "管缆埋设任务载荷，限定为履带式海底重载作业机器人、拖曳式海底重载作业机器人、特种工作级深海机器人声明的埋设、跟踪、感知、定位和检测硬件。"

  tree_valve_operation:
    common:
      - "多功能液压机械臂"
      - "电液机械臂"
      - "高清水下摄像机"
      - "双目视觉模块（可选）"
      - "LED照明系统"
      - "激光标尺"
      - "三维视觉系统（可选）"
      - "前视声呐"
      - "成像声呐（可选）"
      - "INS惯性导航系统"
      - "DVL多普勒测速仪"
      - "USBL超短基线定位系统"
      - "深度传感器"
      - "高度计"
      - "泄漏检测传感器（可选）"
    description: "采油树操作面板插拔任务载荷，限定为通用工作级深海机器人中声明的机械臂、视觉、声学、导航定位和状态感知硬件。"


