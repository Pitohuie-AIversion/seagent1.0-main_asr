# DVL底锁失效风险区（作业需谨慎，做好应急措施）
dvl_bottom_lock_failure_areas:
  # =====================================
  # 南海北部深水陆坡沉积与内潮风险区
  # =====================================
  - id: "dvl_failure_south_china_sea_northern_slope"
    name: "南海北部陆坡DVL底锁风险区"
    aliases: ["南海北部陆坡DVL风险区", "南海陆坡DVL底锁风险区", "南海北部深水DVL风险区", "南海北部陆坡底锁风险区"]
    lat_range: [18.0, 22.5]
    lon_range: [112.0, 118.0]
    notes: >
      DVL底锁风险增加区域。
      南海北部陆坡存在复杂沉积环境和强内潮动力过程。
      内潮及底边界层流动可导致海底沉积物再悬浮，
      改变近底声学传播环境，增加水下声学导航设备底锁稳定性风险。
      不代表DVL必然失效。
      作业前应结合多波束、侧扫声呐、海床沉积资料及DVL实时质量指标判断。
      证据来源:
      南海北部陆坡内潮导致底流增强和沉积物再悬浮研究。


  # =====================================
  # 珠江口盆地深水沉积风险区
  # =====================================
  - id: "dvl_failure_pearl_river_mouth_basin"
    name: "珠江口盆地深水沉积DVL底锁风险区"
    aliases: ["珠江口盆地DVL风险区", "珠江口深水DVL底锁风险区", "珠江口盆地软沉积风险区"]
    lat_range: [20.0, 22.0]
    lon_range: [113.0, 116.0]
    notes: >
      DVL底锁风险增加区域。
      珠江口盆地属于南海北部重要沉积盆地，
      发育厚层海相沉积。
      深水区域可能存在低速沉积层和复杂海底声学传播环境。
      该区域仅用于风险提示，
      不作为DVL失效确定区域。
      作业前需获取实际作业点海床声学和地质资料。


  # =====================================
  # 南海东北部强内潮影响区
  # =====================================
  - id: "dvl_failure_scs_internal_tide_zone"
    name: "南海东北部内潮扰动DVL风险区"
    aliases: ["南海东北部内潮区", "南海内潮DVL风险区", "南海底边界层扰动区"]
    lat_range: [20.0, 23.0]
    lon_range: [116.0, 121.0]
    notes: >
      DVL动态环境风险区域。
      南海东北部存在强内潮活动，
      观测研究显示内潮可增强底层流速并引起沉积物再悬浮。
      强底流和悬浮颗粒变化可能影响近底声学环境，
      增加DVL bottom lock稳定性风险。
      不代表所有任务点均存在底锁失效。
