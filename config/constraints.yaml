  # ── 水深约束 ─────────────────────────────────────────────────────────────────

  - id: "C004"
    name: "ROV最大工作水深约束"
    applies_to: ["all"]
    check_type: "depth_vs_rov_limit"
    violation_message: >
      任务水深超过所选ROV的最大工作水深限制（{rov_max_depth}m），
      设备无法到达目标深度。请更换能力更强的ROV或修改任务水深。
    severity: "hard"

  # ── 时间约束 ─────────────────────────────────────────────────────────────────

  - id: "C030"
    name: "任务开始时间不能早于当前时间"
    applies_to: ["all"]
    check_type: "start_time_not_in_past"
    violation_message: >
      任务开始时间 {start_time} 早于当前系统时间 {current_time}，
      可能表示任务开始时间已过期。请确认是否继续，或将任务开始时间修改为当前时间之后。
    severity: "soft"

  # ── 环境约束 ─────────────────────────────────────────────────────────────────

